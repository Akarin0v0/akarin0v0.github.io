<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 2048 挑战 - V1.0</title>
    <style>
        body { font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif; background-color: #faf8ef; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #game-container { background-color: #bbada0; width: 340px; height: 340px; border-radius: 6px; position: relative; padding: 10px; cursor: default; }
        .grid-cell { width: 70px; height: 70px; margin: 5px; background-color: rgba(238, 228, 218, 0.35); border-radius: 3px; float: left; }
        .tile { width: 70px; height: 70px; border-radius: 3px; position: absolute; background-color: #eee4da; color: #776e65; font-weight: bold; font-size: 35px; line-height: 70px; text-align: center; transition: all 0.1s ease-in-out; }
        /* 各种数字的颜色 */
        .tile-2 { background-color: #eee4da; }
        .tile-4 { background-color: #ede0c8; }
        .tile-8 { background-color: #f2b179; color: #f9f6f2; }
        .tile-16 { background-color: #f59563; color: #f9f6f2; }
        .tile-32 { background-color: #f67c5f; color: #f9f6f2; }
        .tile-64 { background-color: #f65e3b; color: #f9f6f2; }
        .tile-128 { background-color: #edcf72; color: #f9f6f2; font-size: 30px; }
        .tile-256 { background-color: #edcc61; color: #f9f6f2; font-size: 30px; }
        .tile-512 { background-color: #edc850; color: #f9f6f2; font-size: 30px; }
        .tile-1028 { background-color: #edc53f; color: #f9f6f2; font-size: 25px; }
        .tile-2048 { background-color: #edc22e; color: #f9f6f2; font-size: 25px; }
        #score-container { font-size: 25px; font-weight: bold; background-color: #bbada0; color: white; padding: 5px 20px; border-radius: 3px; margin-bottom: 10px; }
        #restart-button { margin-top: 15px; padding: 10px 20px; background-color: #8f7a66; color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>
    <div id="score-container">分数: <span id="score">0</span></div>
    <div id="game-container">
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        </div>
    <button id="restart-button">重新开始</button>
    <p style="color: #776e65; font-size: 14px; margin-top: 20px;">使用方向键 (↑ ↓ ← →) 玩游戏</p>

    <script>
        const gameContainer = document.getElementById('game-container');
        const scoreSpan = document.getElementById('score');
        const restartButton = document.getElementById('restart-button');
        let board = [];
        let score = 0;
        const rows = 4;
        const columns = 4;

        // 初始化游戏
        function initGame() {
            board = Array(rows).fill().map(() => Array(columns).fill(0));
            score = 0;
            updateScore();
            gameContainer.querySelectorAll('.tile').forEach(tile => tile.remove());
            addRandomTile();
            addRandomTile();
            drawBoard();
        }

        // 添加随机数字 (2 或 4)
        function addRandomTile() {
            let emptyCells = [];
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < columns; c++) {
                    if (board[r][c] === 0) emptyCells.push({r, c});
                }
            }
            if (emptyCells.length > 0) {
                let {r, c} = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[r][c] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        // 渲染棋盘
        function drawBoard() {
            gameContainer.querySelectorAll('.tile').forEach(tile => tile.remove());
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < columns; c++) {
                    if (board[r][c] > 0) {
                        let tile = document.createElement('div');
                        let value = board[r][c];
                        tile.className = `tile tile-${value}`;
                        tile.innerText = value;
                        // 计算绝对定位
                        tile.style.top = `${r * 80 + 10}px`;
                        tile.style.left = `${c * 80 + 10}px`;
                        gameContainer.appendChild(tile);
                    }
                }
            }
        }

        function updateScore() { scoreSpan.innerText = score; }

        // 核心逻辑：移动和合并 (以向左移动为例)
        function filterZero(row) { return row.filter(num => num !== 0); }
        function slide(row) {
            row = filterZero(row); // [2, 0, 2, 2] -> [2, 2, 2]
            for (let i = 0; i < row.length - 1; i++) {
                if (row[i] === row[i+1]) {
                    row[i] *= 2;
                    row[i+1] = 0;
                    score += row[i];
                }
            } // [4, 0, 2]
            row = filterZero(row); // [4, 2]
            while (row.length < columns) { row.push(0); } // [4, 2, 0, 0]
            return row;
        }

        // 处理按键
        function handleKeydown(e) {
            let boardChanged = false;
            let oldBoard = JSON.stringify(board);

            if (e.key === 'ArrowLeft') {
                for (let r = 0; r < rows; r++) { board[r] = slide(board[r]); }
            } else if (e.key === 'ArrowRight') {
                for (let r = 0; r < rows; r++) { board[r] = slide(board[r].reverse()).reverse(); }
            } else if (e.key === 'ArrowUp') {
                for (let c = 0; c < columns; c++) {
                    let row = [board[0][c], board[1][c], board[2][c], board[3][c]];
                    row = slide(row);
                    for (let r = 0; r < rows; r++) { board[r][c] = row[r]; }
                }
            } else if (e.key === 'ArrowDown') {
                for (let c = 0; c < columns; c++) {
                    let row = [board[0][c], board[1][c], board[2][c], board[3][c]];
                    row = slide(row.reverse()).reverse();
                    for (let r = 0; r < rows; r++) { board[r][c] = row[r]; }
                }
            }

            if (oldBoard !== JSON.stringify(board)) {
                addRandomTile();
                drawBoard();
                updateScore();
                if (isGameOver()) { alert('游戏结束！得分: ' + score); }
            }
        }

        // 判断游戏结束
        function isGameOver() {
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < columns; c++) {
                    if (board[r][c] === 0) return false;
                    if (r < rows - 1 && board[r][c] === board[r+1][c]) return false;
                    if (c < columns - 1 && board[r][c] === board[r][c+1]) return false;
                }
            }
            return true;
        }

        document.addEventListener('keydown', handleKeydown);
        restartButton.addEventListener('click', initGame);

        // 启动游戏
        initGame();

    </script>
</body>
</html>
